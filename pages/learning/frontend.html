<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infiszki!</title>
  <link type="text/css" href="/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link type="text/css" href="/css/styles.css" rel="stylesheet">
  <script type="text/javascript" src="/js/materialize.min.js"></script>
  <link rel="manifest" href="/manifest.json">
</head>
<body class ="white lighten-4">
  <nav>
    <div class="nav-wrapper container">
      <a href="/"><span>FRONTEND</span></a>
    </div>
  </nav>
  
  <div class="container-outer">
    <div class="container-inner">
      <p class="progress-title">Progres</p>
      <div class="progress">
        <div class="determinate" id="progress-bar" style="width: 0%;"></div>
      </div>
      <div class="card-panel white row">
        <div id="question-container"></div>
        <button class="category-button" id="flashcardButton"></button>
        <div id="answer-container" style="display: none;"></div>
      </div>
      <div>
        <p id="help">Kliknij w fiszkę aby zobaczyć odpowiedź!</p>
      </div>
      <div>
        <button id="prevQuestionButton" class="waves-effect waves-light btn"><i class="material-icons">keyboard_arrow_left</i></button>
        <button id="chooseCategoryButton" class="waves-effect waves-light btn"><i class="material-icons">home</i></button>
        <button id="nextQuestionButton" class="waves-effect waves-light btn"><i class="material-icons">keyboard_arrow_right</i></button>
      </div>
    </div>
  </div>

<script src="/js/flaschcard_order.js"></script>
</body>
</html>
