<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infiszki!</title>
  <link type="text/css" href="/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link type="text/css" href="/css/styles.css" rel="stylesheet">
  <script type="text/javascript" src="/js/materialize.min.js"></script>
  <link rel="manifest" href="/manifest.json">
</head>
<body class ="white lighten-4">
  <nav>
    <div class="nav-wrapper container">
      <button id="chooseCategoryButton" class="waves-effect waves-light btn">
        <i class="material-icons">keyboard_backspace</i>
      </button>
      <a id="categorySpan" href="/"><span></span></a>
    </div>
  </nav>
  <div class = "progress-bar-placement">
    <p id = "acb" class="progress-title">Ukończono: </p>
    <div class="progress">
      <div class="determinate" id="progress-bar" style="width: 0%;"></div>
    </div>    
  </div>

  <div class="container-outer">
    <div class="container-inner">
      <div class="card-panel white row">
        <div id="question-container"></div>
        <div id="answer-container" style="display: none;"></div>
      </div>
    </div>
  </div>

    <div class="next-previous-button">
        
      <p id="help">Kliknij w fiszkę aby zobaczyć odpowiedź!</p>
      <button id="nextQuestionButton" class="waves-effect waves-light btn"><i class="material-icons">keyboard_arrow_right</i></button>
      
    </div>

  <script src="/js/redirect.js"></script>
  <script src="/js/flashcard_random.js"></script>
</body>
</html>
