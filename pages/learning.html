<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infiszki!</title>
  <link type="text/css" href="/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link type="text/css" href="/css/styles.css" rel="stylesheet">
  <script type="text/javascript" src="/js/materialize.min.js"></script>
  <link rel="manifest" href="/manifest.json">
  <script src="/js/flaschcard_order.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("question-container").addEventListener("click", toggleAnswer);
    });
  </script>
</head>
<body class="white lighten-4">
  <nav>
    <div class="nav-wrapper container">
      <a id="chooseCategoryButton" class="waves-effect waves-light btn" href="languages.html">
        <i class="material-icons">keyboard_backspace</i>
      </a>
      <a id="categorySpan" href="/"><span></span></a>
    </div>
  </nav>
  <div class="progress-bar-placement">
    <p id="abc" class="progress-title">Ukończono: </p>
    <div class="progress">
      <div class="determinate" id="progress-bar" style="width: 0%;"></div>
    </div>    
  </div>
  <div class="container-outer">
    <div class="container-inner">
      <div class="card-panel white row">
        <div id="question-container"></div>
        <div id="answer-container" style="display: none;" onclick="toggleAnswer()"></div>     
      </div>
    </div>
  </div>
  <div class="next-previous-button">
    <p id="help">Kliknij w fiszkę aby zobaczyć odpowiedź!</p>
    <a id="prevQuestionButton" class="waves-effect waves-light btn" onclick="prevQuestion()"><i class="material-icons">keyboard_arrow_left</i></a>
    <a id="nextQuestionButton" class="waves-effect waves-light btn" onclick="nextQuestion()"><i class="material-icons">keyboard_arrow_right</i></a>
  </div>
</body>
</html>
